# Exclude a variety of commonly ignored directories.
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".ipynb_checkpoints",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pyenv",
    ".pytest_cache",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    ".vscode",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "site-packages",
    "venv",
]

# Will format at line-length 100 but will only give error at max-line-length 120
line-length = 100
indent-width = 4

# Assume Python 3.10
target-version = "py310"

[lint]
# Selecting default rules for now
select = ["E4", "E7", "E9", "F"]

# F841: unused variables; many occurences, unnecessary refactor at the time of writing
# F821: undefined variable name; some occurences for _repsources, possibly a command parameter
# E712: use `not var` instead of `var == False`; some occurences and is an unsafe fix
ignore = ["F841", "F821", "E712"]

# NOTE: We're enabling only basic rules. Won't be enabling complexity rule
# because there are many functions over the complexity limit of 10, which
# means there would be too much refactor to be done.

[lint.pycodestyle]
# E501 reports lines that exceed the length of 120 in case they can't be wrapped.
max-line-length = 120

[format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

# Like Black, respect magic trailing commas.
skip-magic-trailing-comma = false

# Enable auto-formatting of code examples in docstrings. Markdown,
# reStructuredText code/literal blocks and doctests are all supported.
#
# This is currently disabled by default, but it is planned for this
# to be opt-out in the future.
docstring-code-format = false

# Set the line length limit used when formatting code snippets in
# docstrings.
#
# This only has an effect when the `docstring-code-format` setting is
# enabled.
docstring-code-line-length = "dynamic"
